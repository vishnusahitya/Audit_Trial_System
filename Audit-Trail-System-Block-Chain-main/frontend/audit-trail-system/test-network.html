<!DOCTYPE html>
<html>
<head>
    <title>Network Test</title>
</head>
<body>
    <h1>MetaMask Network Test</h1>
    <button onclick="checkNetwork()">Check Current Network</button>
    <button onclick="switchNetwork()">Switch to Hardhat (31337)</button>
    <div id="result" style="margin-top: 20px; font-family: monospace;"></div>

    <script>
        async function checkNetwork() {
            if (!window.ethereum) {
                document.getElementById('result').innerHTML = '❌ MetaMask not installed!';
                return;
            }

            try {
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                const chainIdDecimal = parseInt(chainId, 16);
                
                document.getElementById('result').innerHTML = `
                    <strong>Current Network:</strong><br>
                    Chain ID (hex): ${chainId}<br>
                    Chain ID (decimal): ${chainIdDecimal}<br>
                    <br>
                    ${chainIdDecimal === 31337 ? '✅ Correct! You are on Hardhat Local' : '❌ Wrong network! Need Chain ID 31337'}
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = '❌ Error: ' + error.message;
            }
        }

        async function switchNetwork() {
            if (!window.ethereum) {
                alert('MetaMask not installed!');
                return;
            }

            try {
                // Try to switch to Hardhat network
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x7a69' }], // 31337 in hex
                });
                alert('✅ Switched to Hardhat Local!');
                checkNetwork();
            } catch (switchError) {
                // Network doesn't exist, add it
                if (switchError.code === 4902) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: '0x7a69',
                                chainName: 'Hardhat Local',
                                rpcUrls: ['http://127.0.0.1:8545'],
                                nativeCurrency: {
                                    name: 'ETH',
                                    symbol: 'ETH',
                                    decimals: 18
                                }
                            }]
                        });
                        alert('✅ Network added and switched!');
                        checkNetwork();
                    } catch (addError) {
                        alert('❌ Failed to add network: ' + addError.message);
                    }
                } else {
                    alert('❌ Failed to switch: ' + switchError.message);
                }
            }
        }

        // Auto-check on load
        window.onload = checkNetwork;
    </script>
</body>
</html>
